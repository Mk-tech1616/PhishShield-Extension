<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Phishing Detector</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .history-entry {
      padding: 10px;
      margin: 5px 0;
      border-radius: 4px;
      background: #f5f5f5;
    }
    .history-entry.phishing {
      border-left: 4px solid #ff4444;
    }
    .history-entry.safe {
      border-left: 4px solid #4CAF50;
    }
    .history-entry .url {
      color: #666;
      font-size: 12px;
      word-break: break-all;
    }
    .history-entry .time {
      color: #999;
      font-size: 11px;
    }
    .report-link {
      color: #ff4444;
      text-decoration: none;
      font-size: 12px;
      margin-left: 5px;
    }
    .report-link:hover {
      text-decoration: underline;
    }

    /* Explainable AI box */
    #xai-box {
      margin-top: 8px;
      padding: 8px;
      background: #fff3f3;
      border-left: 4px solid #ff4444;
      border-radius: 4px;
      display: none;
    }
    #xai-box ul {
      margin: 6px 0 0 16px;
      padding: 0;
    }
    #xai-box li {
      font-size: 12px;
      color: #b71c1c;
    }

    .error {
      color: #b71c1c;
      background: #ffe6e6;
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h3>🔎 Phishing URL Checker</h3>

  <div id="currentStatus">
    <div id="loading" style="display:none; margin-top: 10px;">⏳ Scanning...</div>
    <div id="result" style="margin-top: 10px;"></div>

    <!-- Explainable AI (Why this site is flagged) -->
    <div id="xai-box">
      <b>Why is this site flagged?</b>
      <ul id="xai-reasons"></ul>
    </div>
  </div>

  <hr>

  <h4>📜 Recent Scans</h4>
  <div id="history"></div>

  <script src="popup.js"></script>
</body>
</html>
